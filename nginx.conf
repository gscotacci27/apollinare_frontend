server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Hashed assets in /assets/ — cache forever, mai fallback su index.html
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "max-age=31536000, immutable";
    }

    # Service worker — never cache (browser must always re-fetch)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # manifest.json — short cache
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — index.html non va mai in cache (altrimenti deploy non si vedono)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
